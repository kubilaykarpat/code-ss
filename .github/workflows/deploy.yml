name: Deploy to Cloudflare Pages

on:
  push:
    branches: ['**']

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=code-ss --branch=${{ github.ref_name }}

      - name: Write preview URL to step summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          {
            echo "### Cloudflare Pages preview"
            echo ""
            echo "- Branch alias: $ALIAS_URL"
            echo "- Deployment:   $DEPLOYMENT_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        if: github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          BRANCH: ${{ github.ref_name }}
          MARKER: '<!-- cf-pages-preview -->'
        run: |
          set -euo pipefail
          PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            echo "No open PR for branch $BRANCH — skipping comment."
            exit 0
          fi
          BODY=$(printf '%s\n\n**Cloudflare Pages preview**\n\n- Branch alias: %s\n- Deployment: %s\n' "$MARKER" "$ALIAS_URL" "$DEPLOYMENT_URL")
          EXISTING=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate --jq "[.[] | select(.body | startswith(\"$MARKER\"))] | .[0].id // empty")
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$EXISTING" -f body="$BODY" >/dev/null
            echo "Updated preview comment on PR #$PR."
          else
            gh pr comment "$PR" --body "$BODY"
            echo "Posted preview comment on PR #$PR."
          fi
